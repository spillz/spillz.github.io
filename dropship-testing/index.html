<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/dropship-testing/manifest.webmanifest" />
  <meta charset="utf-8" />
  <title>Dropship</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Science+Gothic:wght@100..900&display=swap" rel="stylesheet" />
  <style>
    html,body {
      margin:0; height:100%; background:#000; overflow:hidden;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --ui-left: max(10px, env(safe-area-inset-left));
      --ui-right: max(10px, env(safe-area-inset-right));
      --ui-top: max(10px, env(safe-area-inset-top));
      --ui-bottom: max(10px, env(safe-area-inset-bottom));
    }
    #gl, #overlay {
      width:100vw; height:100vh; display:block; position:fixed; left:0; top:0;
      touch-action:none; user-select:none;
    }
    #gl { z-index: 0; }
    #overlay { pointer-events:none; z-index: 1; }
    #hud {
      position:fixed; left:var(--ui-left); top:calc(var(--ui-top) + 40px); color:#ddd;
      font: 600 clamp(10px, 1.4vw, 13px)/1.2 "Science Gothic", ui-sans-serif, system-ui, sans-serif;
      background: rgba(0,0,0,0.35); padding:8px 10px; border:1px solid #111; border-radius:8px;
      max-width: min(95vw, 1100px);
      white-space: normal;
      overflow-wrap: anywhere;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 8;
      display: none;
    }
    #planet-label {
      position: fixed; right: var(--ui-right); bottom: var(--ui-bottom);
      color: #dbe7ff; letter-spacing: 0.04em;
      font: 600 clamp(12px, 2.2vw, 20px)/1.12 "Science Gothic", ui-sans-serif, system-ui, sans-serif;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      text-align: right;
      max-width: min(46vw, 640px);
      white-space: normal;
      overflow-wrap: anywhere;
      pointer-events: none; user-select: none;
      z-index: 9;
    }
    #objective-label {
      position: fixed; left: var(--ui-left); bottom: var(--ui-bottom);
      color: #e8f0ff; letter-spacing: 0.03em;
      font: 600 clamp(12px, 2vw, 18px)/1.12 "Science Gothic", ui-sans-serif, system-ui, sans-serif;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      max-width: min(50vw, 720px);
      white-space: pre-line;
      overflow-wrap: anywhere;
      pointer-events: none; user-select: none;
      z-index: 9;
    }
    #ship-status-label {
      position: fixed; left: var(--ui-left); top: var(--ui-top);
      color: #e8f0ff; letter-spacing: 0.03em;
      font: 600 clamp(12px, 2vw, 18px)/1.1 "Science Gothic", ui-sans-serif, system-ui, sans-serif;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      max-width: min(68vw, 880px);
      white-space: normal;
      overflow-wrap: anywhere;
      pointer-events: none; user-select: none;
      z-index: 9;
    }
    body.help-touch-visible #ship-status-label {
      left: calc(var(--ui-left) + 84px);
      max-width: min(58vw, 740px);
    }
    @media (max-width: 900px) {
      #objective-label, #planet-label { max-width: min(47vw, 360px); }
      #ship-status-label { max-width: min(74vw, 560px); }
      #hud { top: calc(var(--ui-top) + 46px); }
      body.help-touch-visible #ship-status-label {
        left: calc(var(--ui-left) + 78px);
        max-width: min(62vw, 500px);
      }
    }
    #heat-meter {
      position: fixed; left: 50%; bottom: var(--ui-bottom); transform: translateX(-50%);
      display: none; padding: 6px 10px;
      color: #fff; letter-spacing: 0.12em; text-transform: uppercase;
      font: 700 clamp(11px, 1.7vw, 14px) "Science Gothic", ui-sans-serif, system-ui, sans-serif;
      background: rgba(0,0,0,0.35); border: 1px solid #111; border-radius: 8px;
      pointer-events: none; user-select: none; text-align: center;
      z-index: 9;
    }
    #heat-meter .heat-bar {
      width: min(44vw, 220px); height: 6px; margin-top: 6px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px; overflow: hidden;
    }
    #heat-meter .heat-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #ffffff, #ff3b1f);
    }
    #heat-meter.heat-flash {
      animation: heatFlash 0.6s infinite;
    }
    @keyframes heatFlash {
      0% { color: #ffffff; box-shadow: 0 0 0 rgba(255,59,31,0.0); }
      50% { color: #ff3b1f; box-shadow: 0 0 12px rgba(255,59,31,0.45); }
      100% { color: #ffffff; box-shadow: 0 0 0 rgba(255,59,31,0.0); }
    }
  </style>
  <script type="module" crossorigin src="/dropship-testing/assets/index-nMYlrQ9i.js"></script>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="overlay"></canvas>
<div id="hud"></div>
<div id="planet-label"></div>
<div id="objective-label"></div>
<div id="ship-status-label"></div>
<div id="heat-meter">
  <div class="heat-text">Heat 0</div>
  <div class="heat-bar"><div class="heat-bar-fill"></div></div>
</div>

</body>
</html>
