<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Happy Mother's Day 2026</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="envelope-cover" aria-label="A sealed Mother's Day envelope">
      <div class="envelope" aria-hidden="true">
        <div class="envelope-back"></div>
        <div class="envelope-flap"></div>
        <div class="envelope-pocket left"></div>
        <div class="envelope-pocket right"></div>
      </div>
      <button id="music-toggle" type="button" aria-label="Open the Mother's Day card" aria-pressed="false">
        <span>NJ</span>
      </button>
    </div>
    <canvas id="garden" aria-label="A growing carnation bush and Mother's Day message"></canvas>
    <noscript>Happy Mother's Day 2026, Nanna J. With love from Henry, Evan, Thomas, Sammi and Damien.</noscript>
    <script src="script.js"></script>
  </body>
</html>
